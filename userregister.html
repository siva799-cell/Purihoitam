<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration - Purohit Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    /* Telugu Font */
    @font-face {
      font-family: 'PottiTelugu';
      src: url('./fonts/PottiSreeramulu-Regular.ttf') format('truetype');
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* BODY */
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f3e5ab, #ffd89b, #ffb347);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* CONTAINER */
    .container {
      width: 100%;
      max-width: 500px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgb(154, 145, 85);
      position: relative;
      overflow: hidden;
      animation: slideIn 0.6s ease-out;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #ff6a00, #ff8c42);
    }

    /* HEADINGS */
    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #ff6a00;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #000000;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        opacity: 0.8;
      }

      to {
        opacity: 1;
      }
    }

    .telugu-subtitle {
      color: #ff8c42;
      font-family: 'PottiTelugu', serif;
      font-size: 18px;
      font-weight: 500;
    }

    /* FORM */
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* PHOTO */
    .photo-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 10px;
    }

    .photo-preview img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #ff9933;
      object-fit: cover;
      box-shadow: 0 4px 12px rgba(255, 106, 0, 0.2);
      transition: all 0.3s ease;
    }

    .upload-btn {
      margin-top: 15px;
      padding: 8px 20px;
      background: #f8f9fa;
      color: #333;
      border: 2px solid #e1e5e9;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .upload-btn:hover {
      border-color: #ff6a00;
      color: #ff6a00;
      transform: translateY(-2px);
    }

    .upload-btn input {
      display: none;
    }

    /* FORM GROUPS */
    .form-group {
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    /* INPUTS */
    .form-group input {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e1e5e9;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    .form-group input:focus {
      outline: none;
      border-color: #ff6a00;
      background: white;
      box-shadow: 0 0 0 3px rgba(255, 106, 0, 0.1);
    }

    .mobile-input-wrapper {
      display: flex;
      align-items: center;
      border: 2px solid #e1e5e9;
      border-radius: 12px;
      background: #f8f9fa;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .mobile-input-wrapper:focus-within {
      border-color: #ff6a00;
      background: white;
      box-shadow: 0 0 0 3px rgba(255, 106, 0, 0.1);
    }

    .country-code {
      background: #e9ecef;
      padding: 15px 12px;
      border-right: 2px solid #e1e5e9;
      color: #495057;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      user-select: none;
    }

    .mobile-input-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 15px 20px 15px 10px;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }

    .mobile-input-wrapper input:focus {
      outline: none;
      box-shadow: none;
    }

    /* TERMS & CONDITIONS */
    .terms-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: #555;
      background: #fdfbf7;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ffe0b3;
    }

    .terms-group input {
      margin-top: 3px;
      cursor: pointer;
      width: 18px;
      height: 18px;
      accent-color: #ff6a00;
    }

    .terms-group a {
      color: #ff6a00;
      text-decoration: none;
      font-weight: 600;
    }

    /* BUTTON */
    button[type="submit"] {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ff6a00, #ff8c42);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 106, 0, 0.3);
    }

    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #666;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: #ff6a00;
    }

    .login-link {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
    }

    .login-link a {
      color: #ff6a00;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    /* Animation */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <a href="main.html" class="back-link">
    <i class="fas fa-arrow-left"></i> Back to Home
  </a>

  <div class="container">
    <div class="logo-section">
      <div class="logo">🕉 Purohit Connect</div>
      <div class="subtitle">User Registration</div>
      <div class="telugu-subtitle">వినియోగదారు నమోదు</div>
    </div>

    <form id="userRegisterForm">

      <!-- PHOTO -->
      <div class="photo-preview">
        <img id="previewImg" src="https://via.placeholder.com/120?text=Upload+Photo">
        <label class="upload-btn">
          <i class="fas fa-camera"></i> Profile Picture (Optional)
          <input type="file" id="photo" accept="image/*">
        </label>
      </div>

      <!-- NAME -->
      <div class="form-group">
        <label for="name">Full Name / పూర్తి పేరు <span style="color: red;">*</span></label>
        <input type="text" id="name" placeholder="Enter your full name" required>
      </div>

      <!-- PHONE -->
      <div class="form-group">
        <label for="mobile">Mobile Number / మొబైల్ నంబర్ <span style="color: red;">*</span></label>
        <div class="mobile-input-wrapper">
          <span class="country-code">+91</span>
          <input type="tel" id="mobile" maxlength="10" placeholder="10-digit mobile number" required>
        </div>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label for="email">Email / ఇమెయిల్ (Optional)</label>
        <input type="email" id="email" placeholder="Enter your email address">
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label for="password">Password / పాస్‌వర్డ్ <span style="color: red;">*</span></label>
        <input type="password" id="password" placeholder="Create a password (min 6 chars)" minlength="6" required>
      </div>

      <!-- TERMS & CONDITIONS -->
      <div class="terms-group">
        <input type="checkbox" id="terms" required>
        <label for="terms">
          I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>. <br>
          <span style="font-family: 'PottiTelugu', serif; color: #777;">నేను నిబంధనలు మరియు షరతులను
            అంగీకరిస్తున్నాను.</span>
        </label>
      </div>

      <button type="submit">Create Account / ఖాతాను సృష్టించండి</button>

    </form>

    <div class="login-link">
      Already have an account? <a href="userlogin.html">Log In Here</a>
    </div>

  </div>

  <script>
    // Constants for default cartoon avatars
    const DEFAULT_AVATARS = [
      'img/avatar1.png',
      'img/avatar3.png'
    ];
    let selectedPhotoData = null;

    // Pick a random default cartoon avatar on load and set it as preview if no photo is chosen
    window.onload = function () {
      const randomIndex = Math.floor(Math.random() * DEFAULT_AVATARS.length);
      document.getElementById('previewImg').src = DEFAULT_AVATARS[randomIndex];
      // Pre-fill selected photo with the default in case they don't upload
      selectedPhotoData = DEFAULT_AVATARS[randomIndex];
    };

    // PHOTO PREVIEW
    document.getElementById("photo").addEventListener("change", function (e) {
      let file = e.target.files[0];
      if (file) {
        let reader = new FileReader();
        reader.onload = function (event) {
          document.getElementById("previewImg").src = event.target.result;
          selectedPhotoData = event.target.result; // Saves base64 string for storage
        };
        reader.readAsDataURL(file);
      }
    });

    // PHONE VALIDATION
    document.getElementById("mobile").addEventListener("input", function (e) {
      // Remove any non-numeric characters
      let value = this.value.replace(/\\D/g, '');
      if (value.length > 10) value = value.slice(0, 10);
      this.value = value;
    });

    // FORM SUBMIT
    document.getElementById("userRegisterForm").addEventListener("submit", function (e) {
      e.preventDefault();

      let name = document.getElementById("name").value.trim();
      let mobile = document.getElementById("mobile").value.trim();
      let email = document.getElementById("email").value.trim();
      let password = document.getElementById("password").value;

      if (mobile.length !== 10 || !/^[6-9]/.test(mobile)) {
        alert("Please enter a valid 10-digit Indian Mobile Number / దయచేసి సరైన 10 అంకెల మొబైల్ నంబర్ నమోదు చేయండి");
        return;
      }

      // Collect data
      let userData = {
        name: name,
        phone: mobile,
        email: email,
        password: password,
        profilePic: selectedPhotoData
      };

      // Store in localStorage as the primary logged in user simulation
      localStorage.setItem('registrationData', JSON.stringify(userData));

      // Auto-login after registration
      localStorage.setItem('purohitLoggedIn', 'true');
      localStorage.setItem('purohitName', name);
      localStorage.setItem('purohitMobile', mobile);

      // Simulating a successful submit animation or alert
      alert("Registration Successful! Welcome to Purohit Connect.");

      // Redirect to main page
      window.location.href = 'main.html';
    });
  </script>

</body>

</html>
