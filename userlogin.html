<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login - Purohit Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* Telugu Font */
    @font-face {
      font-family: 'PottiTelugu';
      src: url('./fonts/PottiSreeramulu-Regular.ttf') format('truetype');
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* BODY */
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f3e5ab, #ffd89b, #ffb347);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* CONTAINER */
    .container {
      width: 100%;
      max-width: 450px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgb(154, 145, 85);
      position: relative;
      overflow: hidden;
      animation: slideIn 0.6s ease-out;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #ff6a00, #ff8c42);
    }

    /* HEADINGS */
    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #ff6a00;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #000000;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        opacity: 0.8;
      }

      to {
        opacity: 1;
      }
    }

    .telugu-subtitle {
      color: #ff8c42;
      font-family: 'PottiTelugu', serif;
      font-size: 18px;
      font-weight: 500;
    }

    /* FORM GROUPS */
    .form-group {
      position: relative;
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    /* INPUTS */
    .form-group input {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e1e5e9;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    .form-group input:focus {
      outline: none;
      border-color: #ff6a00;
      background: white;
      box-shadow: 0 0 0 3px rgba(255, 106, 0, 0.1);
    }

    .mobile-input-wrapper {
      display: flex;
      align-items: center;
      border: 2px solid #e1e5e9;
      border-radius: 12px;
      background: #f8f9fa;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .mobile-input-wrapper:focus-within {
      border-color: #ff6a00;
      background: white;
      box-shadow: 0 0 0 3px rgba(255, 106, 0, 0.1);
    }

    .country-code {
      background: #e9ecef;
      padding: 15px 12px;
      border-right: 2px solid #e1e5e9;
      color: #495057;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      user-select: none;
    }

    .mobile-input-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 15px 20px 15px 10px;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }

    .mobile-input-wrapper input:focus {
      outline: none;
      box-shadow: none;
    }

    /* PASSWORD TOGGLE */
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 45px;
      cursor: pointer;
      color: #666;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: #ff6a00;
    }

    /* TERMS & CONDITIONS */
    .terms-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: #555;
      background: #fdfbf7;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ffe0b3;
      margin-bottom: 20px;
    }

    .terms-group input {
      margin-top: 3px;
      cursor: pointer;
      width: 18px;
      height: 18px;
      accent-color: #ff6a00;
    }

    .terms-group a {
      color: #ff6a00;
      text-decoration: none;
      font-weight: 600;
    }

    /* BUTTON */
    button[type="submit"] {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ff6a00, #ff8c42);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 106, 0, 0.3);
    }

    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #666;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: #ff6a00;
    }

    .register-link {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
    }

    .register-link a {
      color: #ff6a00;
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }

      .logo {
        font-size: 24px;
      }
    }

    /* Animation */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <a href="main.html" class="back-link">
    <i class="fas fa-arrow-left"></i> Back to Home
  </a>

  <div class="container">
    <div class="logo-section">
      <div class="logo">🕉 Purohit Connect</div>
      <div class="subtitle">User Login Portal</div>
      <div class="telugu-subtitle">వినియోగదారు లాగిన్ పోర్టల్</div>
    </div>

    <form id="userLoginForm">

      <div class="form-group">
        <label for="mobile">Mobile Number / మొబైల్ నంబర్ <span style="color: red;">*</span></label>
        <div class="mobile-input-wrapper">
          <span class="country-code">+91</span>
          <input type="tel" id="mobile" name="mobile" placeholder="Enter your 10-digit mobile number"
            pattern="[6-9][0-9]{9}" maxlength="10" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password / పాస్‌వర్డ్ <span style="color: red;">*</span></label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <i class="fas fa-eye password-toggle" id="passwordToggle"></i>
      </div>

      <div class="terms-group">
        <input type="checkbox" id="terms" required>
        <label for="terms">
          I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>. <br>
          <span style="font-family: 'PottiTelugu', serif; color: #777;">నేను నిబంధనలు మరియు షరతులను
            అంగీకరిస్తున్నాను.</span>
        </label>
      </div>

      <button type="submit">Log In / లాగిన్</button>

    </form>

    <div class="register-link">
      New to Purohit Connect? <a href="userregister.html">Register Here</a>
    </div>

  </div>

  <script>
    // Password toggle functionality
    document.getElementById('passwordToggle').addEventListener('click', function () {
      const passwordInput = document.getElementById('password');
      const icon = this;
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });

    // Mobile input formatting
    document.getElementById("mobile").addEventListener("input", function (e) {
      let value = this.value.replace(/\D/g, '');
      if (value.length > 10) value = value.slice(0, 10);
      this.value = value;

      const wrapper = this.parentElement;
      if (value.length === 10 && /^[6-9]/.test(value)) {
        wrapper.style.borderColor = '#27ae60';
      } else {
        wrapper.style.borderColor = '#e1e5e9';
      }
    });

    // Form Submit
    document.getElementById("userLoginForm").addEventListener("submit", function (e) {
      e.preventDefault();

      let mobile = document.getElementById("mobile").value.trim();
      let password = document.getElementById("password").value;

      if (mobile.length !== 10 || !/^[6-9]/.test(mobile)) {
        alert("Please enter a valid 10-digit Indian Mobile Number / దయచేసి సరైన 10 అంకెల మొబైల్ నంబర్ నమోదు చేయండి");
        return;
      }

      // Simulate Authentication Check
      let storedUser = localStorage.getItem('registrationData');
      if (storedUser) {
        storedUser = JSON.parse(storedUser);
        if (storedUser.phone === mobile && storedUser.password === password) {
          localStorage.setItem('purohitLoggedIn', 'true');
          localStorage.setItem('purohitName', storedUser.name);
          localStorage.setItem('purohitMobile', mobile);
          alert("Login Successful! Welcome back.");
          window.location.href = 'main.html';
          return;
        }
      }

      alert("Invalid Mobile Number or Password / తప్పు మొబైల్ నంబర్ లేదా పాస్‌వర్డ్");
    });
  </script>

</body>

</html>
